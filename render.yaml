services:
  # Backend
  - type: web
    name: rkl-trove-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  # Free PostgreSQL Database
  - name: rkl-db
    plan: free
